[flake8]
# The codebase is authored at a 120-column width (ORM column definitions and
# FastAPI signatures routinely run past 100). F821 is suppressed in models/
# because SQLAlchemy relationship type hints use string forward-references
# (e.g. Mapped["Resume"]) that flake8 cannot resolve but are valid at runtime.
max-line-length = 120
extend-exclude = alembic, .venv, venv, .pytest_cache, __pycache__, node_modules
per-file-ignores =
    models/*.py:F821

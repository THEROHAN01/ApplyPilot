services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: applypilot
      POSTGRES_PASSWORD: applypilot
      POSTGRES_DB: applypilot
    # Host port 5433 to avoid clashing with a locally-installed Postgres on 5432.
    # In-container clients still use db:5432 over the compose network.
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applypilot"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
  backend:
    build: ./backend
    env_file: ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://applypilot:applypilot@db:5432/applypilot
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: minio:9000
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
  miniodata:
